site_name: Luminus
site_description: Minimal PHP framework - zero dependencies
site_url: https://rinocs.github.io/luminus
repo_url: https://github.com/rinocs/luminus
repo_name: rinocs/luminus

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Routing: routing.md
  - Request & Response: request-response.md
  - Views: views.md
  - Container: container.md
  - Database: database.md
  - Migrations: migrations.md
  - Queues: queues.md
  - Async: async.md
  - Security: security.md
  - Docker & Deploy: docker-deploy.md
  - CLI: cli.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rinocs/luminus

copyright: Copyright &copy; 2026 rinocs
